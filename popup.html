<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="idle-view" hidden>
    <h1>Pomodoro Blocker</h1>
    <label>Session length (min) <input id="sessionMin" type="number" min="1">
      <span class="presets" data-target="sessionMin">
        <button type="button" class="preset">30</button>
        <button type="button" class="preset">60</button>
        <button type="button" class="preset">120</button>
      </span>
    </label>
    <label>Break every (min) <input id="workMin" type="number" min="1"></label>
    <label>Break length (min) <input id="breakMin" type="number" min="1">
      <span class="presets" data-target="breakMin">
        <button type="button" class="preset">5</button>
        <button type="button" class="preset">15</button>
      </span>
    </label>
    <label>Blocked sites (one per line)
      <textarea id="blocklist" rows="5" placeholder="reddit.com"></textarea>
    </label>
    <div id="error" class="error"></div>
    <button id="start">Start session</button>
  </div>

  <div id="running-view" hidden>
    <h1 id="phase-label"></h1>
    <div id="countdown"></div>
    <div id="session-info"></div>
    <button id="stop">Stop early…</button>
    <div id="stop-confirm" hidden>
      <p>Type <b>I give up</b> to stop:</p>
      <input id="stop-phrase" type="text" autocomplete="off">
      <button id="stop-confirmed" disabled>Stop session</button>
    </div>
  </div>

  <a id="open-options" href="#">Settings</a>

  <script src="domains.js"></script>
  <script src="popup.js"></script>
</body>
</html>
