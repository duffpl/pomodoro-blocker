<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Blocker — Settings</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main>
    <img id="hero" src="assets/stop.svg" alt="">

    <div class="header">
      <div class="brand">
        <div class="brand-dot"></div>
        <div class="brand-name">Pomodoro Blocker — Settings</div>
      </div>
    </div>

    <div class="field">
      <div class="field-label-row">
        <label class="field-label" for="blocklist">Blocked sites</label>
        <span class="field-hint">one per line, domain matches all subdomains</span>
      </div>
      <textarea class="sites-textarea" id="blocklist" rows="12" placeholder="reddit.com"></textarea>
    </div>

    <div class="field">
      <div class="field-label-row">
        <label class="field-label" for="message">Block page message</label>
        <span class="field-hint">leave empty for the default</span>
      </div>
      <input class="text-input" id="message" type="text" placeholder="Nope. Not yet." maxlength="120">
    </div>

    <label class="check-row">
      <input type="checkbox" id="auto-return">
      Return to the blocked page automatically when sites unblock (break or session end)
    </label>

    <label class="check-row">
      <input type="checkbox" id="unlock-on-pause">
      Unlock sites when pause is active
    </label>

    <button class="btn-primary" id="save">Save</button>
    <div id="status"></div>

    <p class="hint">Changes apply immediately — also to a running session.</p>
  </main>
  <script src="domains.js"></script>
  <script src="options.js"></script>
</body>
</html>
